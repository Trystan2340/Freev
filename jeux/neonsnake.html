<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake: Cyber Evolution v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --primary-neon: #00ffff;
            --secondary-neon: #ff00ff;
            --shrink-neon: #0088ff;
            --gold-neon: #ffd700;
            --danger-neon: #ff3333;
            --text-color: #fff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
            user-select: none;
        }

        #game-wrapper {
            position: relative;
            transition: transform 0.05s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        #game-container {
            position: relative;
            border: 2px solid var(--primary-neon);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15), inset 0 0 30px rgba(0, 255, 255, 0.05);
            background: radial-gradient(circle at center, #0a0a12 0%, #000 100%);
            overflow: hidden;
            border-radius: 4px;
        }

        canvas {
            display: block;
        }

        /* HUD */
        .hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
            font-size: 0.85rem;
            text-shadow: 0 0 5px var(--primary-neon);
            letter-spacing: 1px;
        }

        .hud-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hud span { color: var(--primary-neon); font-weight: 900; }
        .hud .high-score { color: var(--gold-neon); text-shadow: 0 0 5px var(--gold-neon); }
        
        .combo-box {
            color: var(--gold-neon);
            font-size: 1.2rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
            text-shadow: 0 0 10px var(--gold-neon);
        }
        
        .combo-bar-container {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin-top: 5px;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }
        
        .combo-bar {
            height: 100%;
            width: 100%;
            background: var(--gold-neon);
            transform-origin: left;
            transition: transform 0.1s linear;
        }

        #powerupTimer {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--secondary-neon);
            font-weight: bold;
            animation: pulse 0.5s infinite alternate;
            text-shadow: 0 0 8px currentColor;
        }

        /* Menus */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 8, 0.92);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
            padding: 20px;
            transition: opacity 0.3s;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            line-height: 1;
            background: linear-gradient(180deg, #fff, var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--primary-neon));
            margin-bottom: 10px;
        }

        h2 {
            font-size: 2rem;
            color: var(--danger-neon);
            text-shadow: 0 0 15px var(--danger-neon);
            margin-top: 0;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        button {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--primary-neon);
            color: #fff;
            padding: 15px 40px;
            font-family: 'Orbitron';
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--primary-neon);
            color: #000;
            box-shadow: 0 0 40px var(--primary-neon);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .controls-hint {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #666;
            display: flex;
            gap: 20px;
        }

        .key {
            border: 1px solid #444;
            padding: 2px 6px;
            border-radius: 4px;
            color: #aaa;
        }

        .hidden { display: none !important; }

        /* Pause Button logic */
        #pauseBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.5);
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 15;
            transition: 0.3s;
        }
        #pauseBtn:hover {
            border-color: var(--primary-neon);
            color: var(--primary-neon);
            box-shadow: 0 0 10px var(--primary-neon);
        }

        @keyframes pulse {
            from { opacity: 0.6; transform: translateX(-50%) scale(0.95); }
            to { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }
    </style>
</head>
<body>
    <!-- Bouton Retour Freev -->
    <a href="../index.html" id="freev-back-btn" style="position:fixed;top:14px;left:14px;z-index:9999;display:flex;align-items:center;gap:7px;padding:7px 14px;background:rgba(15,23,42,0.85);border:1px solid rgba(255,255,255,0.15);border-radius:999px;color:#cbd5e1;font-family:sans-serif;font-size:12px;font-weight:600;text-decoration:none;backdrop-filter:blur(10px);transition:all 0.2s ease;" onmouseover="this.style.color='#fff';this.style.borderColor='rgba(34,211,238,0.6)';this.style.boxShadow='0 0 14px rgba(34,211,238,0.25)'" onmouseout="this.style.color='#cbd5e1';this.style.borderColor='rgba(255,255,255,0.15)';this.style.boxShadow='none'">&#8592; Retour</a>

    <div id="game-wrapper">
        <div id="game-container">
            <div class="hud">
                <div class="hud-group">
                    <div>SCORE: <span id="scoreVal">0</span></div>
                    <div style="font-size: 0.7rem; opacity: 0.7;">BEST: <span id="highScoreVal" class="high-score">0</span></div>
                </div>
                <div class="hud-group" style="align-items: flex-end;">
                    <div>LVL: <span id="levelVal">1</span></div>
                    <div id="comboDisplay" class="combo-box">x1</div>
                    <div id="comboBarContainer" class="combo-bar-container">
                        <div id="comboBar" class="combo-bar"></div>
                    </div>
                </div>
            </div>
            
            <div id="powerupTimer" class="hidden"></div>

            <canvas id="gameCanvas"></canvas>

            <div id="pauseBtn" onclick="togglePause()">II</div>

            <!-- Start Menu -->
            <div id="startMenu" class="overlay">
                <h1>NEON SNAKE</h1>
                <div class="subtitle">CYBER EVOLUTION v3.0</div>
                <button onclick="initGame()">JOUER</button>
                <div class="controls-hint">
                    <span><span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span></span>
                    <span>SWIPE</span>
                </div>
            </div>

            <!-- Game Over Menu -->
            <div id="gameOverMenu" class="overlay hidden">
                <h2>CRASH SYSTÈME</h2>
                <p style="margin-bottom: 5px;">SCORE FINAL</p>
                <div style="font-size: 2.5rem; color: var(--primary-neon); font-weight: bold; margin-bottom: 20px;" id="finalScore">0</div>
                <button onclick="initGame()">RETRY</button>
            </div>

            <!-- Pause Menu -->
            <div id="pauseMenu" class="overlay hidden">
                <h1 style="font-size: 2.5rem; color: #fff;">PAUSE</h1>
                <button onclick="togglePause()">REPRENDRE</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('game-wrapper');
        
        // --- Constantes & Configuration ---
        const GRID_SIZE = 20;
        let tileX, tileY;
        
        // --- État du jeu ---
        let snake = [];
        let velocity = {x: 0, y: 0};
        let nextDir = {x: 0, y: 0};
        let food = {};
        let obstacles = [];
        let powerups = [];
        let particles = [];
        
        let score = 0;
        let highScore = localStorage.getItem('neonSnakeHighScore') || 0;
        let level = 1;
        let gameActive = false;
        let isPaused = false;
        
        // Combo System
        let combo = 1;
        let comboTimer = 0;
        const MAX_COMBO_TIME = 4000; // 4 secondes pour manger le suivant
        
        // Timing
        let gameSpeed = 100;
        let lastTime = 0;
        
        // Powerups
        let isGhost = false;
        let ghostEnd = 0;

        // Init High Score UI
        document.getElementById('highScoreVal').innerText = highScore;

        // --- Système de Particules ---
        class Particle {
            constructor(x, y, color, speedMulti = 1) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 3 + 1) * speedMulti;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.03 + 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                return this.life > 0;
            }
            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // --- Redimensionnement ---
        function resize() {
            const maxSize = Math.min(window.innerWidth - 20, window.innerHeight - 100, 500);
            const snappedSize = maxSize - (maxSize % GRID_SIZE);
            canvas.width = canvas.height = snappedSize;
            tileX = tileY = snappedSize / GRID_SIZE;
            if (!gameActive || isPaused) draw();
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Core Game Logic ---
        function initGame() {
            document.getElementById('startMenu').classList.add('hidden');
            document.getElementById('gameOverMenu').classList.add('hidden');
            document.getElementById('pauseMenu').classList.add('hidden');
            
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            velocity = {x: 0, y: -1}; 
            nextDir = {x: 0, y: -1};
            
            score = 0;
            level = 1;
            combo = 1;
            comboTimer = 0;
            gameSpeed = 120;
            obstacles = [];
            powerups = [];
            particles = [];
            isGhost = false;
            isPaused = false;
            
            updateUI();
            updateComboUI();
            spawnFood();
            gameActive = true;
            lastTime = performance.now();
            requestAnimationFrame(loop);
        }

        function togglePause() {
            if (!gameActive) return;
            isPaused = !isPaused;
            const pm = document.getElementById('pauseMenu');
            if (isPaused) {
                pm.classList.remove('hidden');
            } else {
                pm.classList.add('hidden');
                lastTime = performance.now();
            }
        }

        function loop(now) {
            if (!gameActive) return;
            requestAnimationFrame(loop);
            if (isPaused) return;

            // Gestion Combo Timer (indépendant du framerate du jeu)
            if (combo > 1) {
                comboTimer -= 16; // approx 60fps frame time ms
                if (comboTimer <= 0) {
                    combo = 1;
                    comboTimer = 0;
                }
                updateComboUI();
            }

            if (now - lastTime > gameSpeed) {
                update();
                lastTime = now - ((now - lastTime) % gameSpeed);
            }
            draw();
        }

        function update() {
            velocity = nextDir;
            const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

            // 1. Collision Murs
            if (head.x < 0 || head.x >= tileX || head.y < 0 || head.y >= tileY) {
                if (isGhost) {
                    head.x = (head.x + tileX) % tileX;
                    head.y = (head.y + tileY) % tileY;
                } else {
                    return endGame();
                }
            }

            // 2. Collision
            if (!isGhost) {
                if (snake.some((p, index) => index !== snake.length -1 && p.x === head.x && p.y === head.y)) return endGame();
                if (obstacles.some(o => o.x === head.x && o.y === head.y)) return endGame();
            }

            snake.unshift(head);

            // 3. Interactions
            if (head.x === food.x && head.y === food.y) {
                handleEatFood();
            } else {
                let caughtIndex = powerups.findIndex(p => p.x === head.x && p.y === head.y);
                if (caughtIndex !== -1) {
                    applyPowerup(powerups[caughtIndex]);
                    powerups.splice(caughtIndex, 1);
                    snake.pop(); 
                } else {
                    snake.pop();
                }
            }

            // 4. Ghost Timer
            if (isGhost) {
                const remaining = Math.ceil((ghostEnd - Date.now()) / 1000);
                const timerEl = document.getElementById('powerupTimer');
                timerEl.innerText = `GHOST: ${remaining}s`;
                if (Date.now() > ghostEnd) {
                    isGhost = false;
                    timerEl.classList.add('hidden');
                    shakeScreen(5);
                }
            }
        }

        function handleEatFood() {
            // Combo Logic
            if (combo < 5) combo++;
            comboTimer = MAX_COMBO_TIME;

            // Score logic
            const points = 10 * combo;
            score += points;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonSnakeHighScore', highScore);
            }

            shakeScreen(3 + combo); // More shake on higher combo
            
            // Particles
            let pColor = '#0f0';
            if (combo >= 3) pColor = '#ffd700'; // Gold particles for high combo
            createExplosion(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, pColor, 1 + (combo * 0.2));
            
            checkLevelUp();
            spawnFood();
            
            // Powerup Spawn Chance
            if (Math.random() > 0.85) spawnPowerup();
            
            updateUI();
            updateComboUI();
        }

        function createExplosion(x, y, color, force = 1) {
            for(let i=0; i<12; i++) {
                particles.push(new Particle(x, y, color, force));
            }
        }

        function draw() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grille
            ctx.lineWidth = 1;
            const pulse = (Math.sin(Date.now() / 500) + 1) * 0.02 + 0.03;
            ctx.strokeStyle = `rgba(0, 255, 255, ${pulse})`;
            for(let i=0; i<=canvas.width; i+=GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<=canvas.height; i+=GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Obstacles
            ctx.fillStyle = '#222';
            ctx.strokeStyle = '#f00';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#f00';
            obstacles.forEach(o => {
                const x = o.x * GRID_SIZE;
                const y = o.y * GRID_SIZE;
                ctx.fillRect(x + 2, y + 2, GRID_SIZE - 4, GRID_SIZE - 4);
                ctx.strokeRect(x + 4, y + 4, GRID_SIZE - 8, GRID_SIZE - 8);
            });

            // Food
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#0f0';
            ctx.fillStyle = '#0f0';
            if (combo >= 3) { // Food turns gold on high combo
                ctx.shadowColor = '#ffd700';
                ctx.fillStyle = '#ffd700';
            }
            const fx = food.x * GRID_SIZE + GRID_SIZE/2;
            const fy = food.y * GRID_SIZE + GRID_SIZE/2;
            const foodScale = 1 + Math.sin(Date.now() / 150) * 0.15;
            ctx.beginPath();
            ctx.arc(fx, fy, (GRID_SIZE/2 - 2) * foodScale, 0, Math.PI * 2);
            ctx.fill();

            // Powerups
            powerups.forEach(p => {
                const px = p.x * GRID_SIZE + GRID_SIZE/2;
                const py = p.y * GRID_SIZE + GRID_SIZE/2;
                
                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(Date.now() / 300);
                
                if (p.type === 'ghost') {
                    ctx.shadowColor = '#f0f';
                    ctx.fillStyle = '#f0f';
                    ctx.fillRect(-GRID_SIZE/3, -GRID_SIZE/3, GRID_SIZE/1.5, GRID_SIZE/1.5);
                } else if (p.type === 'shrink') {
                    ctx.shadowColor = '#0088ff';
                    ctx.fillStyle = '#0088ff';
                    ctx.beginPath();
                    ctx.arc(0, 0, GRID_SIZE/3, 0, Math.PI*2);
                    ctx.fill();
                }
                
                ctx.restore();
            });

            // Serpent
            snake.forEach((p, i) => {
                const isHead = i === 0;
                let color = isGhost ? `rgba(200, 0, 255, ${0.4 + (1 - i/snake.length)*0.6})` : `rgba(0, 255, 255, ${1 - i/snake.length * 0.5})`;
                let glow = isGhost ? '#d0f' : '#0ff';
                
                ctx.fillStyle = color;
                ctx.shadowColor = glow;
                ctx.shadowBlur = isHead ? 20 : 10;
                
                const sx = p.x * GRID_SIZE;
                const sy = p.y * GRID_SIZE;
                ctx.fillRect(sx + 1, sy + 1, GRID_SIZE - 2, GRID_SIZE - 2);
                
                if (isHead) {
                    // Yeux Dynamiques
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 0;
                    
                    let ex1 = 0, ey1 = 0, ex2 = 0, ey2 = 0;
                    // Déterminer position yeux selon direction
                    if (velocity.x === 1) { // Right
                         ex1 = sx + GRID_SIZE - 8; ey1 = sy + 5;
                         ex2 = sx + GRID_SIZE - 8; ey2 = sy + GRID_SIZE - 9;
                    } else if (velocity.x === -1) { // Left
                         ex1 = sx + 4; ey1 = sy + 5;
                         ex2 = sx + 4; ey2 = sy + GRID_SIZE - 9;
                    } else if (velocity.y === 1) { // Down
                         ex1 = sx + 5; ey1 = sy + GRID_SIZE - 8;
                         ex2 = sx + GRID_SIZE - 9; ey2 = sy + GRID_SIZE - 8;
                    } else { // Up
                         ex1 = sx + 5; ey1 = sy + 4;
                         ex2 = sx + GRID_SIZE - 9; ey2 = sy + 4;
                    }

                    ctx.fillRect(ex1, ey1, 4, 4);
                    ctx.fillRect(ex2, ey2, 4, 4);
                }
            });

            // Particles
            ctx.shadowBlur = 0;
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                if (!p.update()) {
                    particles.splice(i, 1);
                } else {
                    p.draw(ctx);
                }
            }
        }

        // --- Mécaniques ---
        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = { x: Math.floor(Math.random()*tileX), y: Math.floor(Math.random()*tileY) };
                valid = !isOccupied(food.x, food.y);
            }
        }

        function spawnPowerup() {
            if (powerups.length > 0) return;
            
            let p = { x: Math.floor(Math.random()*tileX), y: Math.floor(Math.random()*tileY) };
            
            // Random Type
            p.type = Math.random() > 0.5 ? 'ghost' : 'shrink';

            if (!isOccupied(p.x, p.y)) {
                powerups.push(p);
                setTimeout(() => {
                    const idx = powerups.indexOf(p);
                    if (idx > -1) powerups.splice(idx, 1);
                }, 8000);
            }
        }
        
        function isOccupied(x, y) {
            if (snake.some(s => s.x === x && s.y === y)) return true;
            if (obstacles.some(o => o.x === x && o.y === y)) return true;
            if (powerups.some(p => p.x === x && p.y === y)) return true;
            return false;
        }

        function applyPowerup(p) {
            if (p.type === 'ghost') {
                isGhost = true;
                ghostEnd = Date.now() + 6000;
                const timerEl = document.getElementById('powerupTimer');
                timerEl.classList.remove('hidden');
                timerEl.style.color = 'var(--secondary-neon)';
                createExplosion(p.x * GRID_SIZE + GRID_SIZE/2, p.y * GRID_SIZE + GRID_SIZE/2, '#f0f');
            } else if (p.type === 'shrink') {
                // Shrink snake by 5
                let cut = Math.min(snake.length - 3, 5); // Keep at least 3
                if (cut > 0) {
                    for(let i=0; i<cut; i++) snake.pop();
                    createExplosion(p.x * GRID_SIZE + GRID_SIZE/2, p.y * GRID_SIZE + GRID_SIZE/2, '#0088ff');
                    
                    // Visual feedback text
                    const txt = document.createElement('div');
                    txt.innerText = "SHRINK!";
                    txt.style.position = 'absolute';
                    txt.style.left = '50%';
                    txt.style.top = '40%';
                    txt.style.transform = 'translate(-50%, -50%)';
                    txt.style.color = '#0088ff';
                    txt.style.fontWeight = 'bold';
                    txt.style.fontSize = '2rem';
                    txt.style.textShadow = '0 0 10px #0088ff';
                    txt.style.animation = 'floatUp 0.8s forwards';
                    wrapper.appendChild(txt);
                    setTimeout(() => txt.remove(), 800);
                }
            }
            shakeScreen(8);
        }

        function checkLevelUp() {
            if (score > 0 && score % 100 === 0) { // Slower leveling with combo points
                level++;
                gameSpeed = Math.max(40, gameSpeed - 5);
                spawnObstacle();
                shakeScreen(15);
            }
        }

        function spawnObstacle() {
            let valid = false;
            let o = {};
            for(let i=0; i<10; i++) {
                o = { x: Math.floor(Math.random()*tileX), y: Math.floor(Math.random()*tileY) };
                if (Math.abs(o.x - snake[0].x) > 3 || Math.abs(o.y - snake[0].y) > 3) {
                    if (!isOccupied(o.x, o.y) && !(food.x === o.x && food.y === o.y)) {
                        valid = true;
                        break;
                    }
                }
            }
            if(valid) obstacles.push(o);
        }

        function updateUI() {
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('highScoreVal').innerText = highScore;
            document.getElementById('levelVal').innerText = level;
        }
        
        function updateComboUI() {
            const disp = document.getElementById('comboDisplay');
            const bar = document.getElementById('comboBar');
            const barCont = document.getElementById('comboBarContainer');

            if (combo > 1) {
                disp.innerText = "x" + combo;
                disp.style.opacity = 1;
                barCont.style.display = 'block';
                const pct = (comboTimer / MAX_COMBO_TIME);
                bar.style.transform = `scaleX(${pct})`;
            } else {
                disp.style.opacity = 0;
                barCont.style.display = 'none';
            }
        }

        function shakeScreen(amt) {
            wrapper.style.transform = 'none';
            void wrapper.offsetWidth; 
            const x = (Math.random() - 0.5) * amt;
            const y = (Math.random() - 0.5) * amt;
            wrapper.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(() => { wrapper.style.transform = 'translate(0,0)'; }, 80);
        }

        function endGame() {
            gameActive = false;
            shakeScreen(20);
            createExplosion(snake[0].x * GRID_SIZE, snake[0].y * GRID_SIZE, '#f00');
            setTimeout(() => {
                document.getElementById('gameOverMenu').classList.remove('hidden');
                document.getElementById('finalScore').innerText = score;
            }, 500);
        }

        // --- Contrôles ---
        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
            if (e.key === ' ' || e.key.toLowerCase() === 'p') { togglePause(); return; }
            if (isPaused || !gameActive) return;

            const keys = { 
                ArrowUp: {x:0, y:-1}, ArrowDown: {x:0, y:1}, 
                ArrowLeft: {x:-1, y:0}, ArrowRight: {x:1, y:0},
                w: {x:0, y:-1}, s: {x:0, y:1}, a: {x:-1, y:0}, d: {x:1, y:0}
            };

            if (keys[e.key]) {
                const move = keys[e.key];
                if (move.x !== -velocity.x && move.y !== -velocity.y) nextDir = move;
            }
        });

        // Touch Controls
        let tsX, tsY;
        canvas.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, {passive: false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchend', e => {
            if (!gameActive || isPaused) return;
            const dx = e.changedTouches[0].clientX - tsX;
            const dy = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    const move = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
                    if (move.x !== -velocity.x) nextDir = move;
                }
            } else {
                if (Math.abs(dy) > 30) {
                    const move = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
                    if (move.y !== -velocity.y) nextDir = move;
                }
            }
        }, {passive: false});
    </script>
</body>
</html>
