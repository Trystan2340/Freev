<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeatJump 2.0 - Rythme & Particules</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; touch-action: none; }
        canvas { display: block; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Animation subtile pour le texte */
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
            50% { text-shadow: 0 0 20px rgba(168, 85, 247, 0.8), 0 0 30px rgba(236, 72, 153, 0.6); }
        }
        .text-glow { animation: glow 2s infinite; }
    </style>
</head>
<body class="text-white font-sans antialiased">

    <!-- HUD (Heads Up Display) -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 z-10">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-3xl md:text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">BEATJUMP <span class="text-xs text-white not-italic font-normal align-top opacity-50">v2.0</span></h1>
                <div class="flex gap-4 mt-2 text-sm text-gray-400">
                    <span>Meilleur Score: <b id="high-score" class="text-white">0</b></span>
                    <span id="fps-counter" class="hidden md:inline">FPS: 60</span>
                </div>
            </div>
            <div class="text-right">
                <div class="text-4xl md:text-6xl font-bold transition-transform duration-75" id="score-display">0</div>
                <div class="text-lg md:text-2xl font-bold text-purple-400 opacity-0 transition-opacity duration-300" id="combo-display">x1</div>
            </div>
        </div>

        <!-- Pause overlay (Hidden by default) -->
        <div id="pause-overlay" class="hidden absolute inset-0 bg-black/40 flex items-center justify-center">
            <h2 class="text-4xl font-black tracking-widest text-white">PAUSE</h2>
        </div>
        
        <!-- Progress Bar Container -->
        <div class="w-full h-3 bg-gray-800/50 rounded-full mt-auto overflow-hidden relative backdrop-blur-sm border border-white/5">
            <div id="progress-bar" class="absolute left-0 top-0 h-full bg-gradient-to-r from-purple-600 to-pink-500 w-0"></div>
        </div>
    </div>

    <!-- Menu Screen -->
    <div id="menu-screen" class="absolute inset-0 flex flex-col items-center justify-center z-30 transition-opacity duration-300 bg-black/60 backdrop-blur-md">
        <div class="glass-panel p-8 md:p-12 rounded-3xl shadow-2xl text-center max-w-lg w-[90%] relative overflow-hidden">
            <!-- Decorative gradient blob -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-600 rounded-full blur-3xl opacity-30"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-pink-600 rounded-full blur-3xl opacity-30"></div>

            <h2 id="menu-title" class="text-3xl md:text-4xl font-bold mb-2 text-white relative z-10 text-glow">Play Your Music</h2>
            <p id="menu-subtitle" class="text-gray-400 mb-8 text-sm md:text-base relative z-10">Le niveau est généré dynamiquement selon le rythme.</p>
            
            <div class="space-y-4 relative z-10">
                <label class="group block cursor-pointer">
                    <div class="w-full py-4 border-2 border-dashed border-gray-600 rounded-xl group-hover:border-purple-500 group-hover:bg-purple-500/10 transition-all duration-300 flex flex-col items-center justify-center gap-2">
                        <svg class="w-8 h-8 text-gray-400 group-hover:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                        <span class="text-sm font-semibold text-gray-300 group-hover:text-white">Choisir un fichier MP3</span>
                    </div>
                    <input type="file" id="audio-input" accept="audio/*" class="hidden"/>
                </label>

                <div id="status-area" class="h-8">
                    <p id="loading-text" class="text-xs text-yellow-400 animate-pulse hidden">Analyse des fréquences & génération de la carte...</p>
                    <p id="error-text" class="text-xs text-red-400 hidden"></p>
                </div>

                <button id="start-btn" disabled class="w-full py-4 bg-gray-700 text-gray-500 font-bold rounded-xl transition-all duration-200 shadow-lg transform active:scale-95">
                    Sélectionnez un titre
                </button>
            </div>
            
            <div class="mt-6 text-xs text-gray-500">
                Contrôles : Espace / Clic / Tap pour sauter. <br> 'P' pour Pause.
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * BEATJUMP 2.0 - Core Engine
         */

        const CONFIG = {
            colors: {
                player: '#c084fc', // Purple 400
                obstacle: '#f43f5e', // Rose 500
                floor: '#1e293b',    // Slate 800
                particles: ['#e879f9', '#22d3ee', '#f472b6']
            },
            physics: {
                gravity: 2000,   // Pixels/s² (Ajusté pour DeltaTime)
                jumpForce: 750,  // Pixels/s
                groundHeight: 120,
                gameSpeed: 600,  // Pixels/s
            },
            game: {
                lookAhead: 2.5,  // Secondes visibles à l'écran
                hitboxSlack: 8   // Marge d'erreur en pixels (pour être gentil)
            }
        };

        // --- STATE MANAGEMENT ---
        const state = {
            isRunning: false,
            isPaused: false,
            score: 0,
            combo: 1,
            highScore: localStorage.getItem('beatjump_highscore') || 0,
            
            // Audio
            audioCtx: null,
            audioBuffer: null,
            sourceNode: null,
            analyserNode: null, // Pour les visuels temps réel
            dataArray: null,    // Données fréquences temps réel
            startTime: 0,
            pauseTime: 0,       // Temps où la pause a commencé
            totalPausedTime: 0, // Temps total passé en pause
            
            // Game Objects
            obstacles: [],
            particles: [],
            player: { y: 0, dy: 0, isGrounded: true, rotation: 0 },
            
            // Time
            lastFrameTime: 0
        };

        // --- DOM REFERENCES ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimisation
        const uiElements = {
            score: document.getElementById('score-display'),
            combo: document.getElementById('combo-display'),
            highScore: document.getElementById('high-score'),
            progress: document.getElementById('progress-bar'),
            menu: document.getElementById('menu-screen'),
            startBtn: document.getElementById('start-btn'),
            loading: document.getElementById('loading-text'),
            fps: document.getElementById('fps-counter'),
            pause: document.getElementById('pause-overlay'),
            input: document.getElementById('audio-input')
        };

        uiElements.highScore.innerText = state.highScore;

        // --- RESIZE HANDLING ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Si le jeu n'est pas lancé, on place le joueur au sol
            if (!state.isRunning) {
                state.player.y = canvas.height - CONFIG.physics.groundHeight - 40;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // --- AUDIO ENGINE & LEVEL GENERATION ---

        uiElements.input.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // Reset UI
            uiElements.loading.classList.remove('hidden');
            uiElements.startBtn.disabled = true;
            uiElements.startBtn.innerText = "Chargement...";
            uiElements.startBtn.classList.add('bg-gray-700');

            try {
                const arrayBuffer = await file.arrayBuffer();
                // Création du contexte audio si inexistant
                if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Décodage
                state.audioBuffer = await state.audioCtx.decodeAudioData(arrayBuffer);
                
                // Génération
                analyzeAndGenerate(state.audioBuffer);
                
                // Ready
                uiElements.loading.classList.add('hidden');
                uiElements.startBtn.disabled = false;
                uiElements.startBtn.classList.remove('bg-gray-700', 'text-gray-500');
                uiElements.startBtn.classList.add('bg-purple-600', 'text-white', 'hover:bg-purple-500', 'shadow-purple-500/50');
                uiElements.startBtn.innerText = "JOUER ➤";
            } catch (err) {
                console.error(err);
                uiElements.loading.classList.add('hidden');
                alert("Erreur lors de la lecture du fichier audio. Essayez un autre MP3.");
            }
        });

        // ALGORITHME AMÉLIORÉ : Moyenne glissante (Local Average)
        function analyzeAndGenerate(buffer) {
            state.obstacles = [];
            const data = buffer.getChannelData(0);
            const sampleRate = buffer.sampleRate;
            
            const blockSize = 1024; 
            const samplesPerPixel = blockSize; 
            
            // On calcule l'énergie par blocs pour réduire la charge
            const energies = [];
            for (let i = 0; i < data.length; i += blockSize) {
                let sum = 0;
                for (let j = 0; j < blockSize && i + j < data.length; j++) {
                    sum += data[i+j] * data[i+j]; // Square
                }
                energies.push(Math.sqrt(sum / blockSize)); // RMS
            }

            // Paramètres de détection
            const localWindowSize = 40; // ~1.5 secondes de contexte (selon sampleRate/blockSize)
            const thresholdRatio = 1.4; // Le pic doit être 1.4x plus fort que la moyenne locale
            const minTimeBetween = 0.35; // sec
            let lastSpawnTime = -10;

            for (let i = 0; i < energies.length; i++) {
                // Calculer la moyenne locale autour de i
                let localSum = 0;
                let count = 0;
                const start = Math.max(0, i - localWindowSize);
                const end = Math.min(energies.length, i + localWindowSize);
                
                for (let j = start; j < end; j++) {
                    localSum += energies[j];
                    count++;
                }
                const localAvg = localSum / count;
                
                // Timestamp actuel
                const time = (i * blockSize) / sampleRate;

                // Détection
                if (energies[i] > localAvg * thresholdRatio && energies[i] > 0.05) { // 0.05 = noise floor
                    if (time - lastSpawnTime > minTimeBetween) {
                        state.obstacles.push({
                            time: time,
                            hit: false,
                            passed: false,
                            yOffset: 0 // Potentiel futur: obstacles volants
                        });
                        lastSpawnTime = time;
                    }
                }
            }
            console.log(`Map générée : ${state.obstacles.length} obstacles`);
        }

        // --- PARTICLE SYSTEM ---
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 150 + 50;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0; // 1.0 à 0.0
                this.decay = Math.random() * 2 + 1; // Vitesse de disparition
                this.size = Math.random() * 4 + 2;
            }
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.life -= this.decay * dt;
                this.vy += 500 * dt; // Gravité particules
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        function spawnParticles(x, y, count = 10, color = CONFIG.colors.player) {
            for(let i=0; i<count; i++) {
                state.particles.push(new Particle(x, y, color || CONFIG.colors.particles[Math.floor(Math.random()*3)]));
            }
        }

        // --- GAME LOOP ---

        uiElements.startBtn.addEventListener('click', () => {
            state.isRunning = true;
            state.isPaused = false;
            state.score = 0;
            state.combo = 1;
            state.totalPausedTime = 0;
            state.particles = [];
            state.obstacles.forEach(o => { o.hit = false; o.passed = false; }); // Reset obstacles
            
            uiElements.menu.classList.add('opacity-0', 'pointer-events-none');
            uiElements.combo.style.opacity = '0';
            
            // Audio Playback
            if (state.sourceNode) state.sourceNode.stop();
            state.sourceNode = state.audioCtx.createBufferSource();
            state.sourceNode.buffer = state.audioBuffer;
            
            // Setup Visualizer (Temps Réel)
            state.analyserNode = state.audioCtx.createAnalyser();
            state.analyserNode.fftSize = 256;
            state.dataArray = new Uint8Array(state.analyserNode.frequencyBinCount);
            
            state.sourceNode.connect(state.analyserNode);
            state.analyserNode.connect(state.audioCtx.destination);
            
            state.sourceNode.start(0);
            state.startTime = state.audioCtx.currentTime;
            state.lastFrameTime = performance.now();
            
            state.sourceNode.onended = () => endGame(true);

            requestAnimationFrame(loop);
        });

        function togglePause() {
            if (!state.isRunning) return;
            
            if (state.isPaused) {
                // RESUME
                state.isPaused = false;
                uiElements.pause.classList.add('hidden');
                state.audioCtx.resume();
                // On ajuste le temps pour ne pas sauter en avant
                state.totalPausedTime += (state.audioCtx.currentTime - state.pauseTime);
                state.lastFrameTime = performance.now();
                requestAnimationFrame(loop);
            } else {
                // PAUSE
                state.isPaused = true;
                uiElements.pause.classList.remove('hidden');
                state.audioCtx.suspend();
                state.pauseTime = state.audioCtx.currentTime;
            }
        }

        function loop(timestamp) {
            if (!state.isRunning || state.isPaused) return;

            // Calcul du Delta Time (en secondes)
            const dt = Math.min((timestamp - state.lastFrameTime) / 1000, 0.1); // Cap à 100ms pour éviter les sauts géants
            state.lastFrameTime = timestamp;

            // Temps Musique (Anti-Latence Logic)
            // On soustrait le temps passé en pause pour garder la synchro
            // Note: audioCtx.currentTime continue d'avancer même suspendu sur certains navigateurs, 
            // mais suspend() arrête la lecture. La meilleure synchro est :
            // TempsJeu = (TempsActuel - TempsDepart) - TempsTotalPause (si géré manuellement)
            // Avec WebAudio suspend(), le currentTime s'arrête généralement. 
            // On se base simplement sur le temps audioContext si géré correctement par le navigateur.
            const musicTime = state.audioCtx.currentTime - state.startTime - state.totalPausedTime;

            updatePhysics(dt, musicTime);
            updateUI(musicTime);
            draw(dt, musicTime);

            requestAnimationFrame(loop);
        }

        function updatePhysics(dt, musicTime) {
            const p = state.player;

            // Gravité
            if (!p.isGrounded) {
                p.dy += CONFIG.physics.gravity * dt;
                p.y += p.dy * dt;
                p.rotation += 5 * dt; // Rotation en l'air
            } else {
                p.rotation = 0; // Reset rotation au sol
                // Petit effet de "courir" (oscillation Y minime)
                p.y = (canvas.height - CONFIG.physics.groundHeight - 40) + Math.sin(musicTime * 20) * 2;
            }

            // Collision Sol
            const floorY = canvas.height - CONFIG.physics.groundHeight - 40;
            if (p.y > floorY) {
                if (!p.isGrounded) {
                    // Atterrissage
                    spawnParticles(100 + 20, floorY + 40, 5, '#cbd5e1'); // Dust
                }
                p.y = floorY;
                p.dy = 0;
                p.isGrounded = true;
                // Snap rotation
                p.rotation = 0;
            }
        }

        function draw(dt, musicTime) {
            // Fond et nettoyage avec traînée (motion blur effect)
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- VISUALIZER BACKGROUND ---
            if (state.analyserNode) {
                state.analyserNode.getByteFrequencyData(state.dataArray);
                const barWidth = canvas.width / 40;
                
                // Dessiner des barres en fond
                ctx.fillStyle = 'rgba(168, 85, 247, 0.1)'; // Purple very transparent
                for (let i = 0; i < 40; i++) {
                    const value = state.dataArray[i * 2]; // On prend les basses fréquences
                    const h = (value / 255) * (canvas.height * 0.6);
                    ctx.fillRect(i * barWidth, canvas.height - h, barWidth - 2, h);
                }
                
                // Effet de pulse global sur le fond
                const bass = state.dataArray[5] / 255;
                if (bass > 0.6) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${bass * 0.05})`;
                    ctx.fillRect(0,0, canvas.width, canvas.height);
                }
            }

            // --- SOL ---
            // Le sol bouge visuellement pour donner l'impression de vitesse
            const offset = (musicTime * CONFIG.physics.gameSpeed) % 100;
            ctx.fillStyle = CONFIG.colors.floor;
            ctx.fillRect(0, canvas.height - CONFIG.physics.groundHeight, canvas.width, CONFIG.physics.groundHeight);
            
            // Lignes du sol (Grid effect)
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for(let i = 0; i < canvas.width + 100; i+=100) {
                const x = i - offset;
                ctx.moveTo(x, canvas.height - CONFIG.physics.groundHeight);
                ctx.lineTo(x, canvas.height);
            }
            ctx.stroke();

            // --- OBSTACLES ---
            const playerX = 100;
            const visibleDuration = canvas.width / CONFIG.physics.gameSpeed;

            state.obstacles.forEach(obs => {
                const timeDiff = obs.time - musicTime;
                
                // Trop loin derrière
                if (timeDiff < -0.2) {
                    if (!obs.passed) {
                        obs.passed = true;
                        if (!obs.hit) {
                            state.score += 100 * state.combo;
                            state.combo = Math.min(state.combo + 1, 50); // Cap combo
                            updateScoreAnim();
                        }
                    }
                    return;
                }
                // Trop loin devant
                if (timeDiff > visibleDuration) return;

                // Position X calculée via le temps (Synchro parfaite)
                const x = playerX + (timeDiff * CONFIG.physics.gameSpeed);
                const y = canvas.height - CONFIG.physics.groundHeight - 40;
                const size = 40;

                // Dessin Obstacle
                if (!obs.hit) {
                    ctx.fillStyle = CONFIG.colors.obstacle;
                    // Glow
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = CONFIG.colors.obstacle;
                    ctx.fillRect(x, y, size, size);
                    ctx.shadowBlur = 0;
                    
                    // Détail intérieur
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(x+5, y+5, size-10, size-10);
                }

                // --- COLLISION DETECTION ---
                // Hitbox plus petite que le visuel (pardonner les erreurs)
                if (!obs.hit && !obs.passed) {
                    const slack = CONFIG.game.hitboxSlack;
                    const p = state.player;
                    
                    // AABB Check
                    if (
                        playerX + size - slack > x + slack && // Player Right > Obs Left
                        playerX + slack < x + size - slack && // Player Left < Obs Right
                        p.y + size - slack > y + slack        // Player Bottom > Obs Top
                    ) {
                        obs.hit = true;
                        takeDamage();
                    }
                }
            });

            // --- PARTICLES ---
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.update(dt);
                p.draw(ctx);
                if (p.life <= 0) state.particles.splice(i, 1);
            }

            // --- PLAYER ---
            ctx.save();
            ctx.translate(playerX + 20, state.player.y + 20); // Center pivot
            ctx.rotate(state.player.rotation);
            
            ctx.fillStyle = CONFIG.colors.player;
            ctx.shadowColor = CONFIG.colors.player;
            ctx.shadowBlur = 20;
            ctx.fillRect(-20, -20, 40, 40); // Draw centered
            
            // Oeil blanc (style Geometry Dash)
            ctx.fillStyle = 'white';
            ctx.shadowBlur = 0;
            ctx.fillRect(5, -10, 8, 8);
            
            ctx.restore();
        }

        // --- GAME LOGIC HELPER ---

        function takeDamage() {
            // Reset combo
            state.combo = 1;
            uiElements.combo.style.opacity = '0';
            
            // Visual Shake / Flash
            document.body.style.backgroundColor = '#450a0a';
            setTimeout(() => document.body.style.backgroundColor = '#0f172a', 100);
            
            // Explosion
            const pY = state.player.y + 20;
            spawnParticles(120, pY, 20, CONFIG.colors.obstacle);

            // Score penalty
            state.score = Math.max(0, state.score - 250);
        }

        function updateScoreAnim() {
            // Animation CSS sur le score
            uiElements.score.style.transform = "scale(1.2)";
            setTimeout(() => uiElements.score.style.transform = "scale(1)", 100);
            
            // Affichage Combo
            if (state.combo > 1) {
                uiElements.combo.innerText = `x${state.combo}`;
                uiElements.combo.style.opacity = '1';
                // Couleur changeante selon combo
                if(state.combo > 10) uiElements.combo.classList.replace('text-purple-400', 'text-yellow-400');
                else uiElements.combo.classList.replace('text-yellow-400', 'text-purple-400');
            }
        }

        function updateUI(musicTime) {
            uiElements.score.innerText = Math.floor(state.score);
            const duration = state.audioBuffer ? state.audioBuffer.duration : 1;
            const pct = Math.min((musicTime / duration) * 100, 100);
            uiElements.progress.style.width = `${pct}%`;
        }

        function endGame(victory) {
            state.isRunning = false;
            try { state.sourceNode.stop(); } catch(e){}
            
            // Highscore
            if (state.score > state.highScore) {
                state.highScore = Math.floor(state.score);
                localStorage.setItem('beatjump_highscore', state.highScore);
                uiElements.highScore.innerText = state.highScore;
            }

            uiElements.menu.classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('menu-title').innerText = victory ? "Niveau Terminé !" : "Arrêté";
            uiElements.startBtn.innerText = "REJOUER ↺";
        }

        // --- CONTROLS ---

        function jump() {
            if (state.isPaused) {
                togglePause();
                return;
            }
            if (state.isRunning && state.player.isGrounded) {
                state.player.dy = -CONFIG.physics.jumpForce;
                state.player.isGrounded = false;
                
                // Particules de saut
                spawnParticles(120, canvas.height - CONFIG.physics.groundHeight - 5, 8, '#fff');
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault(); // Stop scrolling
                jump();
            }
            if (e.code === 'KeyP' || e.code === 'Escape') {
                togglePause();
            }
        });

        // Touch / Mouse
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});
        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); jump(); });

    </script>
</body>
</html>
