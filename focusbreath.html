<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusBreath | Freev Outils</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        heading: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            primary: '#0ea5e9', // Sky blue
                            secondary: '#a855f7', // Purple
                            accent: '#22d3ee', // Cyan
                            teal: '#14b8a6',    // Teal for relaxation
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Styles from Freev Core */
        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #14b8a6, #0ea5e9);
            border-radius: 5px;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Breathing Circle Animation Logic */
        .breathing-circle {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.2) 0%, rgba(15, 23, 42, 0) 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s linear; /* Smooth update via JS */
            box-shadow: 0 0 50px rgba(20, 184, 166, 0.1);
        }

        .core-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22d3ee, #14b8a6);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.4);
            z-index: 10;
        }

        .orbit-circle {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 0;
        }

        /* Text Gradients */
        .text-gradient-teal {
            background: linear-gradient(to right, #22d3ee, #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Utilities */
        .hidden-op {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .visible-op {
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="font-sans antialiased selection:bg-brand-teal selection:text-white">

    <!-- Navbar Simplifiée -->
    <header class="fixed w-full z-50 glass">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-lungs text-2xl text-brand-teal animate-pulse-slow"></i>
                <a href="#" class="text-2xl font-heading font-bold tracking-wider">Focus<span class="text-brand-teal">Breath</span></a>
            </div>
            <a href="index.html" class="text-sm font-bold text-gray-300 hover:text-white transition-colors flex items-center gap-2 border border-white/10 px-4 py-2 rounded-full hover:bg-white/5">
                <i class="fa-solid fa-arrow-left"></i> Retour au Hub
            </a>
        </div>
    </header>

    <!-- Main App Container -->
    <main class="flex-grow flex items-center justify-center relative overflow-hidden pt-20">
        <!-- Background Decoration -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-brand-dark via-[#050505] to-[#050505] -z-20"></div>
        <!-- Animated Particles Canvas -->
        <canvas id="relax-canvas" class="absolute inset-0 w-full h-full -z-10 opacity-30"></canvas>

        <div class="container mx-auto px-4 flex flex-col md:flex-row items-center justify-center gap-12 h-full">
            
            <!-- Left Panel: Controls & Settings -->
            <div class="w-full md:w-1/3 glass-card p-8 rounded-2xl relative z-10 animate-float" style="animation-duration: 8s;">
                <h1 class="text-3xl font-heading font-bold mb-2">Respiration <span class="text-gradient-teal">Guidée</span></h1>
                <p class="text-gray-400 text-sm mb-8">Réduisez votre stress et améliorez votre concentration avant vos examens grâce à la cohérence cardiaque.</p>

                <!-- Settings Form -->
                <div class="space-y-6" id="settings-panel">
                    <!-- Mode Selection -->
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Technique</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setMode('coherence')" id="btn-coherence" class="mode-btn active px-3 py-2 rounded-lg bg-brand-teal/20 border border-brand-teal text-brand-teal text-xs font-bold transition-all hover:bg-brand-teal/30">
                                5-5 (Équilibre)
                            </button>
                            <button onclick="setMode('relax')" id="btn-relax" class="mode-btn px-3 py-2 rounded-lg bg-white/5 border border-white/10 text-gray-400 text-xs font-bold transition-all hover:bg-white/10">
                                4-7-8 (Détente)
                            </button>
                            <button onclick="setMode('focus')" id="btn-focus" class="mode-btn px-3 py-2 rounded-lg bg-white/5 border border-white/10 text-gray-400 text-xs font-bold transition-all hover:bg-white/10">
                                4-4-4 (Box)
                            </button>
                        </div>
                    </div>

                    <!-- Duration Slider -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Durée</label>
                            <span id="duration-display" class="text-xs font-bold text-white">5 min</span>
                        </div>
                        <input type="range" id="duration-slider" min="1" max="15" value="5" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-brand-teal">
                    </div>

                    <!-- Action Button -->
                    <button onclick="toggleSession()" id="action-btn" class="w-full py-4 mt-4 bg-gradient-to-r from-brand-teal to-brand-primary text-white font-bold rounded-xl shadow-lg shadow-brand-teal/20 hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
                        <i class="fa-solid fa-play"></i> COMMENCER
                    </button>
                </div>

                <!-- Session Stats (Hidden by default) -->
                <div id="stats-panel" class="hidden mt-6 text-center">
                    <p class="text-gray-400 text-sm">Temps restant</p>
                    <div id="timer-display" class="text-4xl font-mono font-bold text-white mb-2">05:00</div>
                    <button onclick="stopSession()" class="text-sm text-red-400 hover:text-red-300 underline decoration-red-400/30">Arrêter la session</button>
                </div>
            </div>

            <!-- Right Panel: Visualizer -->
            <div class="w-full md:w-2/3 flex flex-col items-center justify-center relative min-h-[500px]">
                
                <!-- Main Breathing Element -->
                <div id="breath-container" class="breathing-circle">
                    <div class="orbit-circle w-[220px] h-[220px] opacity-30"></div>
                    <div class="orbit-circle w-[280px] h-[280px] opacity-10"></div>
                    <div class="core-circle flex items-center justify-center relative">
                        <i class="fa-solid fa-wind text-4xl text-white/50 animate-pulse"></i>
                    </div>
                </div>

                <!-- Instruction Text -->
                <div class="mt-12 text-center h-20">
                    <h2 id="breath-text" class="text-4xl md:text-5xl font-heading font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 transition-all duration-300">
                        Prêt ?
                    </h2>
                    <p id="breath-subtext" class="text-brand-teal mt-2 text-lg font-medium opacity-0 transition-opacity duration-500">
                        Inspirez profondément...
                    </p>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="glass border-t border-white/5 py-6 mt-auto">
        <div class="container mx-auto px-6 text-center text-gray-500 text-sm">
            <p>&copy; 2024 Freev FocusBreath. Designé par Trystan2340.</p>
        </div>
    </footer>

    <script>
        // --- Configuration ---
        const MODES = {
            'coherence': { name: 'Cohérence', inhale: 5, hold: 0, exhale: 5, holdEmpty: 0, color: '#14b8a6' }, // 5-5
            'relax': { name: 'Détente 4-7-8', inhale: 4, hold: 7, exhale: 8, holdEmpty: 0, color: '#a855f7' },
            'focus': { name: 'Box Breathing', inhale: 4, hold: 4, exhale: 4, holdEmpty: 4, color: '#0ea5e9' }
        };

        let currentMode = 'coherence';
        let isRunning = false;
        let timeLeft = 300; // seconds
        let sessionInterval = null;
        let animationFrameId = null;
        let startTime = null;

        // Elements
        const container = document.getElementById('breath-container');
        const textMain = document.getElementById('breath-text');
        const textSub = document.getElementById('breath-subtext');
        const timerDisplay = document.getElementById('timer-display');
        const actionBtn = document.getElementById('action-btn');
        const slider = document.getElementById('duration-slider');
        const displayDuration = document.getElementById('duration-display');

        // --- Setup Listeners ---
        slider.addEventListener('input', (e) => {
            if (!isRunning) {
                timeLeft = e.target.value * 60;
                displayDuration.innerText = e.target.value + " min";
                updateTimerDisplay();
            }
        });

        function setMode(modeKey) {
            if (isRunning) return;
            
            // UI Update
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('bg-brand-teal/20', 'border-brand-teal', 'text-brand-teal');
                btn.classList.add('bg-white/5', 'border-white/10', 'text-gray-400');
            });
            const activeBtn = document.getElementById(`btn-${modeKey}`);
            activeBtn.classList.remove('bg-white/5', 'border-white/10', 'text-gray-400');
            activeBtn.classList.add('bg-brand-teal/20', 'border-brand-teal', 'text-brand-teal');

            currentMode = modeKey;
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function toggleSession() {
            if (isRunning) {
                stopSession();
            } else {
                startSession();
            }
        }

        function startSession() {
            isRunning = true;
            document.getElementById('settings-panel').classList.add('hidden');
            document.getElementById('stats-panel').classList.remove('hidden');
            textSub.classList.remove('opacity-0');
            
            // Reset Start time for animation loop
            startTime = performance.now();
            requestAnimationFrame(animateBreath);

            // Timer countdown
            sessionInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    stopSession();
                    textMain.innerText = "Session terminée";
                    textSub.innerText = "Bien joué !";
                }
            }, 1000);
        }

        function stopSession() {
            isRunning = false;
            clearInterval(sessionInterval);
            cancelAnimationFrame(animationFrameId);
            
            // Reset UI
            document.getElementById('settings-panel').classList.remove('hidden');
            document.getElementById('stats-panel').classList.add('hidden');
            textSub.classList.add('opacity-0');
            
            // Reset visuals
            container.style.transform = 'scale(1)';
            textMain.innerText = "Prêt ?";
            
            // Reset time based on slider
            timeLeft = slider.value * 60;
            updateTimerDisplay();
        }

        // --- Animation Engine ---
        function animateBreath(timestamp) {
            if (!isRunning) return;

            const mode = MODES[currentMode];
            const totalCycle = (mode.inhale + mode.hold + mode.exhale + mode.holdEmpty) * 1000;
            const elapsed = (timestamp - startTime) % totalCycle;

            let scale = 1;
            let label = "";
            let subLabel = "";

            // Timeline logic
            const tInhale = mode.inhale * 1000;
            const tHold1 = tInhale + (mode.hold * 1000);
            const tExhale = tHold1 + (mode.exhale * 1000);
            
            if (elapsed < tInhale) {
                // Inhaling (Scale 1 -> 1.5)
                const progress = elapsed / tInhale;
                // Easing cubic-in-out for natural breath
                const ease = progress < .5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
                scale = 1 + (0.5 * ease);
                label = "Inspirez";
                subLabel = "Par le nez...";
                container.style.boxShadow = `0 0 ${30 + (progress * 50)}px ${mode.color}40`;
            } 
            else if (elapsed < tHold1) {
                // Holding Full (Scale 1.5)
                scale = 1.5;
                label = "Retenez";
                subLabel = "Bloquez doucement...";
            } 
            else if (elapsed < tExhale) {
                // Exhaling (Scale 1.5 -> 1)
                const progress = (elapsed - tHold1) / (mode.exhale * 1000);
                const ease = progress < .5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
                scale = 1.5 - (0.5 * ease);
                label = "Expirez";
                subLabel = "Par la bouche...";
                container.style.boxShadow = `0 0 ${80 - (progress * 50)}px ${mode.color}40`;
            } 
            else {
                // Holding Empty (Scale 1)
                scale = 1;
                label = "Attendez";
                subLabel = "Restez vide...";
            }

            container.style.transform = `scale(${scale})`;
            if (textMain.innerText !== label) textMain.innerText = label;
            if (textSub.innerText !== subLabel) textSub.innerText = subLabel;

            animationFrameId = requestAnimationFrame(animateBreath);
        }


        // --- Background Particles (Simplified from Index) ---
        const canvas = document.getElementById('relax-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vy = -(Math.random() * 0.5 + 0.1); // Always float up slowly
                this.size = Math.random() * 3;
                this.alpha = Math.random() * 0.5;
            }
            update() {
                this.y += this.vy;
                if (this.y < 0) {
                    this.y = height;
                    this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(34, 211, 238, ${this.alpha})`; // Brand Cyan
                ctx.fill();
            }
        }

        for(let i=0; i<40; i++) particles.push(new Particle());

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // Init
        updateTimerDisplay();

    </script>
</body>
</html>
