    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        heading: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            primary: '#0ea5e9', // Sky blue
                            secondary: '#a855f7', // Purple
                            accent: '#22d3ee', // Cyan
                        }
                    },
                    animation: {
                        'pulse-glow': 'pulse-glow 3s infinite',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%, 100%': { boxShadow: '0 0 20px #0ea5e9' },
                            '50%': { boxShadow: '0 0 40px #a855f7' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Styles & Utilities matching Freev */
        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            touch-action: none; /* Prevent scrolling on mobile while drawing */
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #0ea5e9, #a855f7); border-radius: 4px; }

        /* Glassmorphism */
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        /* Canvas Styles */
        canvas {
            image-rendering: pixelated; /* Essential for pixel art */
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #0f172a; /* Dark checkerboard */
            cursor: crosshair;
        }

        .tool-btn {
            transition: all 0.2s;
        }
        .tool-btn.active {
            background: linear-gradient(to right, #0ea5e9, #a855f7);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .frame-preview {
            image-rendering: pixelated;
        }
        .frame-item.active {
            border-color: #22d3ee;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
        }

        /* Canvas Background Animation */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.4;
        }
    </style>
</head>

    <!-- Scripts -->
    <script>
        // --- CONSTANTS & CONFIG ---
        const CANVAS_SIZE_DEFAULT = 32;
        let canvasSize = CANVAS_SIZE_DEFAULT;
        let pixelSize = 20; // Visual scale (calculated on resize)
        
        // --- STATE ---
        let frames = []; // Array of ImageData or Data Arrays
        let currentFrameIndex = 0;
        let isDrawing = false;
        let currentTool = 'pen'; // pen, eraser, bucket, picker
        let currentColor = '#0ea5e9'; // Default Brand Primary
        let showGrid = true;
        let history = []; // Simple history for undo
        let historyStep = -1;

        // --- DOM ELEMENTS ---
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const previewCanvas = document.getElementById('preview-canvas');
        const previewCtx = previewCanvas.getContext('2d');
        const framesContainer = document.getElementById('frames-container');
        const colorPicker = document.getElementById('color-picker');
        const colorPreview = document.getElementById('color-preview');
        const bgCanvas = document.getElementById('bg-canvas');

        // --- INITIALIZATION ---
        function init() {
            // Setup Canvas
            resizeCanvas(canvasSize);
            
            // Initial Frame
            addFrame();
            
            // Event Listeners
            setupEventListeners();
            
            // Start Animation Loop
            startPreviewLoop();
            
            // Start BG Animation
            initBgAnimation();
        }

        // --- CANVAS LOGIC ---
        function resizeCanvas(size) {
            canvasSize = size;
            document.getElementById('canvas-size-display').innerText = `${size}x${size}`;
            
            // Reset current logic
            frames = [];
            currentFrameIndex = -1;
            framesContainer.innerHTML = '';
            
            // Physical size setup
            canvas.width = size;
            canvas.height = size;
            
            // Scale visually via CSS is handled by container, but let's adjust the container style if needed
            // Actually, we use CSS transform or width/height for zoom, but drawing is 1:1 on internal canvas
            const container = document.getElementById('canvas-container');
            const scale = Math.min((container.clientWidth - 64) / size, (container.clientHeight - 64) / size);
            const displaySize = Math.floor(scale * size);
            
            canvas.style.width = `${displaySize}px`;
            canvas.style.height = `${displaySize}px`;
            
            // Re-add first frame
            addFrame(); 
        }

        function changeSize(size) {
            if(confirm("Changer la taille effacera le projet actuel. Continuer ?")) {
                resizeCanvas(size);
            }
        }

        function renderCanvas() {
            // Draw current frame data to canvas
            if (frames[currentFrameIndex]) {
                ctx.putImageData(frames[currentFrameIndex], 0, 0);
            }
            
            // Grid drawing (on top, usually we'd use a separate canvas overlay, 
            // but for simplicity we can toggle CSS background or draw directly)
            // Better approach: Use CSS for grid to avoid messing up ImageData
            if (showGrid) {
                const step = canvas.offsetWidth / canvasSize;
                const bgSize = `${step}px ${step}px`;
                canvas.style.backgroundImage = `
                    linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                    linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px)
                `;
                canvas.style.backgroundSize = bgSize;
            } else {
                canvas.style.backgroundImage = 'none';
            }
        }

        // --- FRAME MANAGEMENT ---
        function addFrame(copyPrevious = false) {
            const newFrame = ctx.createImageData(canvasSize, canvasSize);
            
            if (copyPrevious && frames.length > 0) {
                // Copy data from previous frame
                const prev = frames[frames.length - 1];
                newFrame.data.set(prev.data);
            } else {
                // Fill with transparent (0,0,0,0) - Default
            }

            frames.push(newFrame);
            currentFrameIndex = frames.length - 1;
            updateFramesUI();
            loadFrame(currentFrameIndex);
        }

        function deleteFrame(index) {
            if (frames.length <= 1) return; // Keep at least one
            frames.splice(index, 1);
            if (currentFrameIndex >= frames.length) currentFrameIndex = frames.length - 1;
            updateFramesUI();
            loadFrame(currentFrameIndex);
        }

        function duplicateFrame(index) {
            const source = frames[index];
            const newFrame = new ImageData(new Uint8ClampedArray(source.data), canvasSize, canvasSize);
            frames.splice(index + 1, 0, newFrame);
            currentFrameIndex = index + 1;
            updateFramesUI();
            loadFrame(currentFrameIndex);
        }

        function loadFrame(index) {
            saveCurrentFrameData(); // Save changes before switching
            currentFrameIndex = index;
            ctx.putImageData(frames[index], 0, 0);
            updateFramesUI();
        }

        function saveCurrentFrameData() {
            if (currentFrameIndex > -1 && frames[currentFrameIndex]) {
                frames[currentFrameIndex] = ctx.getImageData(0, 0, canvasSize, canvasSize);
                updateFrameThumbnail(currentFrameIndex);
            }
        }

        function updateFramesUI() {
            framesContainer.innerHTML = '';
            frames.forEach((frame, idx) => {
                const el = document.createElement('div');
                el.className = `frame-item w-full bg-slate-800 border-2 rounded-lg p-2 flex items-center justify-between cursor-pointer transition-all ${idx === currentFrameIndex ? 'active border-brand-accent bg-slate-700' : 'border-transparent hover:bg-slate-700/50'}`;
                
                // Mini canvas for thumbnail
                const thumb = document.createElement('canvas');
                thumb.width = canvasSize;
                thumb.height = canvasSize;
                thumb.className = 'w-10 h-10 image-pixelated bg-black/30 rounded border border-white/10';
                const tCtx = thumb.getContext('2d');
                tCtx.putImageData(frame, 0, 0);

                el.innerHTML = `
                    <div class="flex items-center gap-3" onclick="loadFrame(${idx})">
                        <span class="text-xs font-mono font-bold text-gray-500">${idx + 1}</span>
                        ${thumb.outerHTML}
                    </div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                         <button onclick="duplicateFrame(${idx})" class="text-gray-400 hover:text-white p-1" title="Dupliquer"><i class="fa-solid fa-copy"></i></button>
                         <button onclick="deleteFrame(${idx})" class="text-gray-400 hover:text-red-400 p-1" title="Supprimer"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                // Add hover group class manually to parent
                el.classList.add('group');
                
                framesContainer.appendChild(el);
            });
        }

        function updateFrameThumbnail(index) {
            // Simplified: re-render UI. Optimization possible but not critical for small frame counts.
            // updateFramesUI(); // Called too often? Let's rely on manual updates or loadFrame
        }

        // --- DRAWING TOOLS ---
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            // Handle touch or mouse
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            return {
                x: Math.floor((clientX - rect.left) * scaleX),
                y: Math.floor((clientY - rect.top) * scaleY)
            };
        }

        function drawPixel(x, y, colorStr, isErasing = false) {
            if (x < 0 || x >= canvasSize || y < 0 || y >= canvasSize) return;
            
            if (isErasing) {
                ctx.clearRect(x, y, 1, 1);
            } else {
                ctx.fillStyle = colorStr;
                ctx.fillRect(x, y, 1, 1);
            }
        }

        function floodFill(startX, startY, fillColor) {
            // Get current image data
            const imageData = ctx.getImageData(0, 0, canvasSize, canvasSize);
            const data = imageData.data;
            
            // Helper to get color at x,y
            const getColorAt = (x, y) => {
                const idx = (y * canvasSize + x) * 4;
                return { r: data[idx], g: data[idx+1], b: data[idx+2], a: data[idx+3] };
            };

            const targetColor = getColorAt(startX, startY);
            
            // Convert hex fillColor to rgba
            const r = parseInt(fillColor.slice(1, 3), 16);
            const g = parseInt(fillColor.slice(3, 5), 16);
            const b = parseInt(fillColor.slice(5, 7), 16);
            const a = 255;

            // If target same as fill, return
            if (targetColor.r === r && targetColor.g === g && targetColor.b === b && targetColor.a === a) return;

            const stack = [[startX, startY]];
            
            while (stack.length) {
                const [x, y] = stack.pop();
                const current = getColorAt(x, y);
                
                if (x < 0 || x >= canvasSize || y < 0 || y >= canvasSize) continue;
                if (current.r !== targetColor.r || current.g !== targetColor.g || current.b !== targetColor.b || current.a !== targetColor.a) continue;

                // Color pixel
                const idx = (y * canvasSize + x) * 4;
                data[idx] = r;
                data[idx+1] = g;
                data[idx+2] = b;
                data[idx+3] = a;

                stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
            }
            
            ctx.putImageData(imageData, 0, 0);
            saveCurrentFrameData();
        }

        function pickColor(x, y) {
            const data = ctx.getImageData(x, y, 1, 1).data;
            if (data[3] === 0) return; // Transparent
            
            const hex = "#" + ((1 << 24) + (data[0] << 16) + (data[1] << 8) + data[2]).toString(16).slice(1);
            setColor(hex);
            setTool('pen'); // Auto switch back to pen
        }

        // --- EVENT LISTENERS SETUP ---
        function setupEventListeners() {
            // Mouse / Touch
            const startDraw = (e) => {
                isDrawing = true;
                handleDrawAction(e);
            };
            
            const moveDraw = (e) => {
                if (!isDrawing) return;
                handleDrawAction(e);
            };
            
            const endDraw = () => {
                if (isDrawing) {
                    isDrawing = false;
                    saveCurrentFrameData();
                    updateFramesUI(); // Update thumbnail
                }
            };

            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', moveDraw);
            window.addEventListener('mouseup', endDraw);
            
            // Prevent default touch scrolling
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, {passive: false});
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveDraw(e); }, {passive: false});
            window.addEventListener('touchend', endDraw);

            // Context Menu (Right Click to erase)
            canvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                // Optional: temporary eraser or color pick
            });

            // Color Picker
            colorPicker.addEventListener('input', (e) => setColor(e.target.value));
            
            // Palette Clicks
            document.querySelectorAll('.palette-color').forEach(el => {
                el.addEventListener('click', () => {
                    setColor(el.dataset.color);
                });
            });

            // Tool Buttons
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.addEventListener('click', () => setTool(btn.dataset.tool));
            });
        }

        function handleDrawAction(e) {
            const coords = getCoordinates(e);
            
            // Right click check (simple way for mouse)
            const isRightClick = e.buttons === 2;
            
            if (currentTool === 'bucket' && !isRightClick) {
                // Bucket only on click (mousedown), not drag
                if (e.type === 'mousedown' || e.type === 'touchstart') {
                    floodFill(coords.x, coords.y, currentColor);
                }
            } else if (currentTool === 'picker') {
                if (e.type === 'mousedown' || e.type === 'touchstart') {
                    pickColor(coords.x, coords.y);
                }
            } else {
                // Pen or Eraser
                const erasing = currentTool === 'eraser' || isRightClick;
                drawPixel(coords.x, coords.y, currentColor, erasing);
            }
        }

        // --- UI HELPERS ---
        function setColor(hex) {
            currentColor = hex;
            colorPicker.value = hex;
            colorPreview.style.backgroundColor = hex;
            colorPreview.style.boxShadow = `0 0 15px ${hex}80`; // Add alpha for glow
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                if (btn.dataset.tool === tool) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function toggleGrid() {
            showGrid = !showGrid;
            document.getElementById('grid-btn').classList.toggle('active');
            renderCanvas(); // Actually just updates CSS background
        }

        function clearCanvas() {
            if(confirm("Effacer tout le calque ?")) {
                ctx.clearRect(0, 0, canvasSize, canvasSize);
                saveCurrentFrameData();
                updateFramesUI();
            }
        }

        // --- PREVIEW ANIMATION ---
        let previewInterval;
        let previewIndex = 0;
        
        function startPreviewLoop() {
            clearInterval(previewInterval);
            const fpsSlider = document.getElementById('fps-slider');
            const fpsDisplay = document.getElementById('fps-display');
            
            const run = () => {
                const fps = parseInt(fpsSlider.value);
                fpsDisplay.innerText = `${fps} FPS`;
                
                if (frames.length === 0) return;
                
                // Clear and Draw
                previewCtx.clearRect(0, 0, 128, 128); // Fixed preview size
                
                // Draw current preview frame
                // Need to scale up imageData to fit 128x128
                const frameData = frames[previewIndex];
                if (frameData) {
                    createBitmap(frameData).then(bmp => {
                         previewCtx.imageSmoothingEnabled = false;
                         previewCtx.drawImage(bmp, 0, 0, 128, 128);
                    });
                }

                previewIndex = (previewIndex + 1) % frames.length;
            };

            // Initial Run
            run();
            
            // Dynamic Interval
            fpsSlider.addEventListener('input', () => {
                clearInterval(previewInterval);
                previewInterval = setInterval(run, 1000 / parseInt(fpsSlider.value));
                fpsDisplay.innerText = `${fpsSlider.value} FPS`;
            });
            
            previewInterval = setInterval(run, 1000 / 10);
        }

        // Helper for bitmap (needed to draw imageData scaled)
        function createBitmap(imageData) {
            return createImageBitmap(imageData);
        }

        // --- EXPORT FUNCTIONS ---
        function exportProject() {
            const modal = document.getElementById('export-modal');
            const content = document.getElementById('export-modal-content');
            modal.classList.remove('hidden');
            // Trigger reflow
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0');
            modal.classList.add('opacity-100');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }

        function closeExportModal() {
            const modal = document.getElementById('export-modal');
            const content = document.getElementById('export-modal-content');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function downloadPNG() {
            const link = document.createElement('a');
            link.download = `pixel-forge-${Date.now()}.png`;
            // Resize for download (scale up for visibility, e.g., 10x)
            const exportCanvas = document.createElement('canvas');
            const scale = 10;
            exportCanvas.width = canvasSize * scale;
            exportCanvas.height = canvasSize * scale;
            const exCtx = exportCanvas.getContext('2d');
            exCtx.imageSmoothingEnabled = false;
            
            createBitmap(frames[currentFrameIndex]).then(bmp => {
                exCtx.drawImage(bmp, 0, 0, exportCanvas.width, exportCanvas.height);
                link.href = exportCanvas.toDataURL();
                link.click();
            });
        }

        function downloadSpriteSheet() {
            if (frames.length === 0) return;
            
            const link = document.createElement('a');
            link.download = `spritesheet-${Date.now()}.png`;
            
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvasSize * frames.length;
            exportCanvas.height = canvasSize;
            const exCtx = exportCanvas.getContext('2d');
            
            // Draw all frames side by side
            frames.forEach((frame, i) => {
                 exCtx.putImageData(frame, i * canvasSize, 0);
            });
            
            link.href = exportCanvas.toDataURL();
            link.click();
        }

        function downloadGIF() {
            if (frames.length === 0) return;
            
            const gif = new GIF({
                workers: 2,
                quality: 10,
                width: canvasSize * 10, // Scale up for GIF
                height: canvasSize * 10,
                workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js' 
                // Note: CORS issues might occur with external worker script on some browsers/setups.
                // Fallback approach: If this fails, we often need a local worker file.
                // For this demo environment, we try the CDN.
            });
            
            const promises = frames.map(frame => createBitmap(frame));
            
            Promise.all(promises).then(bitmaps => {
                const delay = 1000 / parseInt(document.getElementById('fps-slider').value);
                
                // Temp canvas for scaling
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvasSize * 10;
                tempCanvas.height = canvasSize * 10;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.imageSmoothingEnabled = false;

                bitmaps.forEach(bmp => {
                    tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
                    tempCtx.drawImage(bmp, 0, 0, tempCanvas.width, tempCanvas.height);
                    gif.addFrame(tempCtx, {copy: true, delay: delay});
                });

                gif.on('finished', function(blob) {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `animation-${Date.now()}.gif`;
                    link.click();
                    closeExportModal();
                });

                gif.render();
            });
        }

        // --- BACKGROUND ANIMATION (From original site) ---
        function initBgAnimation() {
            const ctx = bgCanvas.getContext('2d');
            let width, height;
            let particles = [];

            function resize() {
                width = bgCanvas.width = window.innerWidth;
                height = bgCanvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 2 + 1;
                    this.color = Math.random() > 0.5 ? '#0ea5e9' : '#a855f7';
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 30; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach((p, index) => {
                    p.update();
                    p.draw();
                    for (let j = index + 1; j < particles.length; j++) {
                        const p2 = particles[j];
                        const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                        if (dist < 150) {
                            ctx.strokeStyle = `rgba(255, 255, 255, ${1 - dist/150})`; // Faint lines
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Initialize App
        window.addEventListener('load', init);

    </script>
